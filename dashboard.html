<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jacob's Progress - Parent Dashboard</title>
  <style>
    :root {
      --navy: #1B2A4A;
      --teal: #1A8A7D;
      --coral: #E87461;
      --cream: #FAF5EE;
      --cream2: #F0EBE3;
      --white: #FFFFFF;
      --forest: #2D8659;
      --gold: #E8D48A;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--cream);
      color: var(--navy);
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 { font-size: 1.6rem; margin-bottom: 4px; }
    .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 24px; }
    .card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }
    .card h2 {
      font-size: 1.1rem;
      margin-bottom: 12px;
      color: var(--teal);
    }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-box {
      background: var(--cream);
      border-radius: var(--radius);
      padding: 16px 12px;
      text-align: center;
    }
    .stat-box .value {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--navy);
    }
    .stat-box .label {
      font-size: 0.75rem;
      color: #888;
      margin-top: 4px;
    }
    .section-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .section-card {
      background: var(--cream);
      border-radius: var(--radius);
      padding: 14px;
    }
    .section-card .name {
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 6px;
    }
    .section-card .detail {
      font-size: 0.8rem;
      color: #666;
    }
    .section-card .accuracy {
      font-size: 1.2rem;
      font-weight: 800;
      margin-top: 4px;
    }
    .accuracy.high { color: var(--forest); }
    .accuracy.mid { color: var(--gold); }
    .accuracy.low { color: var(--coral); }
    .progress-bar {
      height: 6px;
      background: var(--cream2);
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--teal);
    }
    .activity-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--cream2);
      font-size: 0.85rem;
    }
    .activity-row:last-child { border-bottom: none; }
    .activity-date { color: #888; }
    .activity-xp { font-weight: 700; color: var(--teal); }
    .activity-quizzes { color: #666; }
    .recent-quiz {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--cream2);
      font-size: 0.85rem;
    }
    .recent-quiz:last-child { border-bottom: none; }
    .quiz-section {
      font-weight: 700;
      text-transform: capitalize;
    }
    .quiz-score { font-weight: 700; }
    .quiz-score.high { color: var(--forest); }
    .quiz-score.mid { color: var(--gold); }
    .quiz-score.low { color: var(--coral); }
    .quiz-time { color: #888; font-size: 0.8rem; }
    .countdown-card {
      background: var(--navy);
      color: white;
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      margin-bottom: 16px;
    }
    .countdown-card .days {
      font-size: 3rem;
      font-weight: 800;
      color: var(--gold);
      line-height: 1;
    }
    .countdown-card .days-label {
      font-size: 0.9rem;
      color: #ccc;
      margin-top: 4px;
    }
    .countdown-card .days-msg {
      font-size: 0.85rem;
      color: var(--teal);
      font-weight: 600;
      margin-top: 8px;
    }
    .weekly-plan-card { margin-bottom: 16px; }
    .weekly-focus-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }
    .weekly-focus-item {
      background: var(--cream);
      border-radius: var(--radius);
      padding: 12px;
      text-align: center;
    }
    .weekly-focus-item .sec-name {
      font-weight: 700;
      font-size: 0.85rem;
      margin-bottom: 4px;
    }
    .weekly-focus-item .sec-target {
      font-size: 0.75rem;
      color: #888;
    }
    .weekly-focus-item.met {
      border: 2px solid var(--forest);
      background: #e6f4ec;
    }
    .weekly-focus-item.not-met {
      border: 2px solid var(--coral);
    }
    .day-dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 12px;
    }
    .day-dot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .day-dot .dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--cream2);
    }
    .day-dot .dot.active {
      background: var(--teal);
    }
    .day-dot .day-label {
      font-size: 0.65rem;
      color: #888;
      font-weight: 600;
    }
    @media (max-width: 500px) {
      .weekly-focus-row { grid-template-columns: 1fr; }
    }
    .status-banner {
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 16px;
      font-weight: 700;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-banner.done { background: #e6f4ec; color: var(--forest); border: 2px solid var(--forest); }
    .status-banner.idle { background: #fdecea; color: #b5402f; border: 2px solid var(--coral); }
    .status-banner .sub { font-weight: 500; font-size: 0.82rem; color: #666; display: block; margin-top: 2px; }
    .help-card { border: 2px solid var(--coral); }
    .help-card h2 { color: var(--coral); }
    .help-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--cream2);
    }
    .help-row:last-child { border-bottom: none; }
    .help-name { font-weight: 700; font-size: 0.92rem; }
    .help-sub { font-size: 0.78rem; color: #888; margin-top: 2px; }
    .help-acc { font-weight: 800; color: var(--coral); font-size: 1.05rem; }
    .help-none { color: var(--forest); font-weight: 600; padding: 8px 0; }
    .report-card { border-top: 4px solid var(--teal); }
    .report-summary { font-size: 1rem; line-height: 1.5; color: var(--navy); margin-bottom: 16px; }
    .report-block { margin-top: 14px; }
    .report-h { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 8px; }
    .report-h.good { color: var(--forest); }
    .report-h.mid { color: #b8860b; }
    .report-h.bad { color: var(--coral); }
    .report-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--cream2); }
    .report-row:last-child { border-bottom: none; }
    .report-name { font-weight: 600; font-size: 0.92rem; }
    .report-acc { font-weight: 800; font-size: 0.95rem; }
    .report-acc.good { color: var(--forest); }
    .report-acc.mid { color: #b8860b; }
    .report-acc.bad { color: var(--coral); }
    .report-advice { padding: 10px 0; border-bottom: 1px solid var(--cream2); }
    .report-advice:last-child { border-bottom: none; }
    .report-advice-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .report-tip { font-size: 0.88rem; color: #555; line-height: 1.45; }
    .review-card { border-top: 4px solid var(--coral); }
    .rev-activity { padding: 12px 0; border-bottom: 1px solid var(--cream2); }
    .rev-activity:last-child { border-bottom: none; }
    .rev-head { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px; margin-bottom: 8px; }
    .rev-title { font-weight: 800; font-size: 0.95rem; text-transform: capitalize; }
    .rev-score { font-weight: 800; font-size: 0.9rem; }
    .rev-score.high { color: var(--forest); } .rev-score.mid { color: #b8860b; } .rev-score.low { color: var(--coral); }
    .rev-time { color: #999; font-size: 0.78rem; margin-left: auto; }
    .rev-q { background: var(--cream); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
    .rev-prompt { font-weight: 600; font-size: 0.88rem; margin-bottom: 6px; }
    .rev-ans { display: flex; flex-direction: column; gap: 2px; font-size: 0.84rem; }
    .rev-given { color: var(--coral); }
    .rev-correct { color: var(--forest); font-weight: 600; }
    .loading { text-align: center; padding: 40px; color: #888; }
    .refresh-btn {
      background: var(--teal);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 20px;
    }
    @media (max-width: 500px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <h1>Jacob's 11+ Progress</h1>
  <p class="subtitle">Parent Dashboard</p>
  <button class="refresh-btn" onclick="loadDashboard()">Refresh</button>
  <div id="dashboard"><p class="loading">Loading...</p></div>

  <script type="module">
    const URL = 'https://pimhwskthibxkpfjlkfu.supabase.co';
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpbWh3c2t0aGlieGtwZmpsa2Z1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NDEzNjksImV4cCI6MjA5NzIxNzM2OX0.urlGrk-K0o7H3Us3sOizvZ4-S8SAB2uULHAGGYro4RY';
    const PID = 'ff567baf-d27e-43b7-94f2-90dbe19fd031';
    const hdrs = { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` };

    async function get(table, params) {
      const u = new window.URL(`${URL}/rest/v1/${table}`);
      for (const [k,v] of Object.entries(params || {})) u.searchParams.set(k, v);
      const r = await fetch(u, { headers: hdrs });
      return r.ok ? r.json() : [];
    }

    function pct(correct, total) {
      return total > 0 ? Math.round((correct / total) * 100) : 0;
    }

    function accClass(p) {
      return p >= 70 ? 'high' : p >= 40 ? 'mid' : 'low';
    }

    function fmtDate(d) {
      return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    }

    function fmtTime(t) {
      return new Date(t).toLocaleString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    }

    const SECTION_NAMES = {
      'learn-first': 'Learn New Words',
      vocabulary: 'Vocabulary',
      inference: 'Inference',
      comprehension: 'Comprehension',
      spelling: 'Spelling',
      punctuation: 'Punctuation',
      'sentence-completion': 'Sentence Completion',
      'verbal-reasoning': 'Verbal Reasoning',
      'word-skills': 'Word Skills',
      maths: 'Maths',
      nvr: 'NVR',
      writing: 'Writing',
      collocations: 'Collocations'
    };

    // Concrete "what to do next" advice shown when a section is weak.
    const SECTION_ADVICE = {
      vocabulary: 'Learn 5 new words a day from his reading book. Ask him to use each in his own sentence, not just recall the meaning.',
      inference: 'Read the passage with him twice before he answers. Ask "which words in the text tell you that?" so he points to evidence rather than guessing.',
      comprehension: 'Slow him down: read the question first, then hunt the passage for the answer. Underline the line that proves it.',
      spelling: 'Use Look-Cover-Write-Check on the words he misses. Practise the same 5 words across the week until they stick.',
      punctuation: 'Focus on one rule at a time (capital letters, full stops, then commas). Have him fix deliberately wrong sentences.',
      'sentence-completion': 'Get him to read the whole sentence and try each option aloud. The right word should sound and make sense.',
      'verbal-reasoning': 'These are puzzles with rules. Practise little and often, 10 minutes daily beats one long session.',
      'word-skills': 'Build word power: 10 minutes of synonyms, antonyms or word classes a day. Talk about new words and use them at home.',
      maths: 'Pin down which topic is slipping (times tables, fractions, word problems) and drill just that. Speed comes after accuracy.',
      nvr: 'Talk through what changes between the shapes (rotation, shading, number). Spotting the pattern is the whole skill.',
      writing: 'Plan before writing: who, where, problem, ending. Praise good word choices and one thing to improve, not everything.',
      collocations: 'Notice which words "go together" when reading aloud. Collect good pairs in a notebook.'
    };

    // GL Assessment countdown
    const GL_DATE = new Date('2027-09-18T00:00:00');
    function daysUntilGL() {
      const now = new Date();
      now.setHours(0, 0, 0, 0);
      return Math.ceil((GL_DATE - now) / (1000 * 60 * 60 * 24));
    }
    function glMessage(days) {
      if (days <= 0) return 'Good luck Jacob!';
      if (days < 50) return "Nearly there \u2014 he's got this!";
      if (days < 100) return 'Getting closer \u2014 stay focused!';
      if (days < 150) return "He's doing great \u2014 keep going!";
      return 'Plenty of time \u2014 keep building!';
    }

    // Weekly plan (mirrors ui.js)
    const WEEKLY_PLAN = [
      { sections: ['vocabulary', 'maths', 'spelling'], targets: { vocabulary: '10 words', maths: '15 questions', spelling: '10 words' } },
      { sections: ['inference', 'nvr', 'punctuation'], targets: { inference: '3 passages', nvr: '10 questions', punctuation: '10 questions' } },
      { sections: ['verbal-reasoning', 'writing', 'sentence-completion'], targets: { 'verbal-reasoning': '10 questions', writing: '1 prompt', 'sentence-completion': '10 questions' } },
      { sections: ['vocabulary', 'maths', 'spelling'], targets: { vocabulary: '15 words', maths: '20 questions', spelling: '15 words' } },
      { sections: ['inference', 'nvr', 'punctuation'], targets: { inference: '4 passages', nvr: '15 questions', punctuation: '15 questions' } },
      { sections: ['verbal-reasoning', 'writing', 'sentence-completion'], targets: { 'verbal-reasoning': '15 questions', writing: '1 prompt', 'sentence-completion': '15 questions' } },
      { sections: ['vocabulary', 'maths', 'spelling'], targets: { vocabulary: '20 words', maths: '25 questions', spelling: '20 words' } },
      { sections: ['inference', 'nvr', 'punctuation'], targets: { inference: '5 passages', nvr: '20 questions', punctuation: '20 questions' } },
      { sections: ['verbal-reasoning', 'writing', 'sentence-completion'], targets: { 'verbal-reasoning': '20 questions', writing: '2 prompts', 'sentence-completion': '20 questions' } },
      { sections: ['vocabulary', 'maths', 'spelling'], targets: { vocabulary: '20 words', maths: '30 questions', spelling: '20 words' } },
      { sections: ['inference', 'nvr', 'punctuation'], targets: { inference: '5 passages', nvr: '25 questions', punctuation: '20 questions' } },
      { sections: ['verbal-reasoning', 'writing', 'sentence-completion'], targets: { 'verbal-reasoning': '25 questions', writing: '2 prompts', 'sentence-completion': '20 questions' } },
      { sections: ['vocabulary', 'maths', 'spelling'], targets: { vocabulary: '25 words', maths: '30 questions', spelling: '25 words' } },
      { sections: ['inference', 'nvr', 'punctuation'], targets: { inference: '6 passages', nvr: '25 questions', punctuation: '25 questions' } },
      { sections: ['verbal-reasoning', 'writing', 'sentence-completion'], targets: { 'verbal-reasoning': '25 questions', writing: '2 prompts', 'sentence-completion': '25 questions' } },
      { sections: ['vocabulary', 'maths', 'spelling'], targets: { vocabulary: '25 words', maths: '35 questions', spelling: '25 words' } },
      { sections: ['inference', 'nvr', 'punctuation'], targets: { inference: '6 passages', nvr: '30 questions', punctuation: '25 questions' } },
      { sections: ['verbal-reasoning', 'writing', 'sentence-completion'], targets: { 'verbal-reasoning': '30 questions', writing: '3 prompts', 'sentence-completion': '25 questions' } },
      { sections: ['vocabulary', 'maths', 'spelling'], targets: { vocabulary: '30 words', maths: '40 questions', spelling: '30 words' } },
      { sections: ['inference', 'nvr', 'punctuation'], targets: { inference: '7 passages', nvr: '30 questions', punctuation: '30 questions' } },
      { sections: ['verbal-reasoning', 'writing', 'sentence-completion'], targets: { 'verbal-reasoning': '30 questions', writing: '3 prompts', 'sentence-completion': '30 questions' } },
      { sections: ['vocabulary', 'maths', 'spelling'], targets: { vocabulary: '30 words', maths: '40 questions', spelling: '30 words' } },
      { sections: ['inference', 'nvr', 'punctuation'], targets: { inference: '8 passages', nvr: '35 questions', punctuation: '30 questions' } },
      { sections: ['verbal-reasoning', 'writing', 'sentence-completion'], targets: { 'verbal-reasoning': '35 questions', writing: '3 prompts', 'sentence-completion': '30 questions' } }
    ];

    function getCurrentWeekIndex() {
      const epoch = new Date('2025-01-06T00:00:00');
      const now = new Date();
      now.setHours(0, 0, 0, 0);
      const diffMs = now - epoch;
      const diffWeeks = Math.floor(diffMs / (7 * 24 * 60 * 60 * 1000));
      return ((diffWeeks % WEEKLY_PLAN.length) + WEEKLY_PLAN.length) % WEEKLY_PLAN.length;
    }

    async function loadDashboard() {
      const el = document.getElementById('dashboard');
      el.innerHTML = '<p class="loading">Loading...</p>';

      const [stats, quizzes, activity] = await Promise.all([
        get('j11_player_stats', { player_id: `eq.${PID}`, select: '*' }),
        get('j11_quiz_results', { player_id: `eq.${PID}`, select: '*', order: 'completed_at.desc', limit: '100' }),
        get('j11_daily_activity', { player_id: `eq.${PID}`, select: '*', order: 'date.desc', limit: '14' })
      ]);

      const s = stats[0] || { total_xp: 0, level: 1, current_streak: 0, best_streak: 0 };

      // Aggregate per section
      const sections = {};
      for (const q of quizzes) {
        if (!sections[q.section]) sections[q.section] = { correct: 0, total: 0, count: 0 };
        sections[q.section].correct += q.correct;
        sections[q.section].total += q.total;
        sections[q.section].count += 1;
      }

      // ── Did Jacob actually practise? (the "check" answer, up top) ──
      const todayStr = new Date().toISOString().slice(0, 10);
      const lastQuizTime = quizzes.length ? quizzes[0].completed_at : (s.last_active || null);
      const todayCount = quizzes.filter(q => (q.completed_at || '').slice(0, 10) === todayStr).length;
      let bannerHtml = '';
      if (todayCount > 0) {
        bannerHtml = `<div class="status-banner done">✅ Practised today &mdash; ${todayCount} quiz${todayCount === 1 ? '' : 'zes'} done
          <span class="sub">Last activity ${lastQuizTime ? fmtTime(lastQuizTime) : ''}</span></div>`;
      } else if (lastQuizTime) {
        const daysAgo = Math.floor((new Date(todayStr) - new Date(lastQuizTime.slice(0, 10))) / 86400000);
        const ago = daysAgo <= 0 ? 'earlier today' : daysAgo === 1 ? 'yesterday' : `${daysAgo} days ago`;
        bannerHtml = `<div class="status-banner idle">⚠️ Nothing logged today
          <span class="sub">Last practised ${ago} (${fmtTime(lastQuizTime)})</span></div>`;
      } else {
        bannerHtml = `<div class="status-banner idle">⚠️ No practice recorded yet
          <span class="sub">Once Jacob completes a quiz it will appear here within seconds</span></div>`;
      }

      // GL Countdown
      const glDays = daysUntilGL();
      const glMsg = glMessage(glDays);
      const glLabel = glDays <= 0 ? 'GL Assessment day!' : `day${glDays === 1 ? '' : 's'} until GL Assessment`;

      let html = bannerHtml + `
        <div class="countdown-card">
          <div class="days">${Math.max(glDays, 0)}</div>
          <div class="days-label">${glLabel}</div>
          <div class="days-msg">${glMsg}</div>
        </div>`;

      // Weekly Study Plan
      const weekIdx = getCurrentWeekIndex();
      const plan = WEEKLY_PLAN[weekIdx];

      // Check which focus sections have activity this week
      const now = new Date();
      const dayOfWeek = now.getDay();
      const mondayOffset = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
      const weekStart = new Date(now);
      weekStart.setDate(now.getDate() - mondayOffset);
      weekStart.setHours(0, 0, 0, 0);
      const weekStartStr = weekStart.toISOString().slice(0, 10);

      // Check activity from quizzes this week
      const thisWeekQuizzes = quizzes.filter(q => q.completed_at >= weekStartStr);
      const sectionQuizCounts = {};
      for (const q of thisWeekQuizzes) {
        sectionQuizCounts[q.section] = (sectionQuizCounts[q.section] || 0) + 1;
      }

      html += `<div class="card weekly-plan-card"><h2>This Week's Plan (Week ${weekIdx + 1} of 24)</h2>`;
      html += `<div class="weekly-focus-row">`;
      for (const secId of plan.sections) {
        const name = SECTION_NAMES[secId] || secId;
        const target = plan.targets[secId] || '';
        const hasDone = (sectionQuizCounts[secId] || 0) > 0;
        const cls = hasDone ? 'met' : 'not-met';
        html += `<div class="weekly-focus-item ${cls}">
          <div class="sec-name">${name} ${hasDone ? '\u2713' : ''}</div>
          <div class="sec-target">Target: ${target}</div>
          <div class="sec-target">${sectionQuizCounts[secId] || 0} done this week</div>
        </div>`;
      }
      html += `</div></div>`;

      // Weekly Activity - which days Jacob practised
      const dayNames = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
      const daysWithActivity = new Set();
      for (const q of thisWeekQuizzes) {
        const d = new Date(q.completed_at);
        const dayIdx = d.getDay() === 0 ? 6 : d.getDay() - 1;
        daysWithActivity.add(dayIdx);
      }
      html += `<div class="card"><h2>Weekly Activity</h2>`;
      html += `<div class="day-dots">`;
      for (let i = 0; i < 7; i++) {
        const isToday = i === mondayOffset;
        const active = daysWithActivity.has(i);
        html += `<div class="day-dot">
          <div class="dot ${active ? 'active' : ''}" ${isToday ? 'style="outline:2px solid var(--navy);outline-offset:2px;"' : ''}></div>
          <span class="day-label">${dayNames[i]}</span>
        </div>`;
      }
      html += `</div></div>`;

      // Overview stats
      html += `
        <div class="stats-row">
          <div class="stat-box"><div class="value">${s.total_xp}</div><div class="label">Total XP</div></div>
          <div class="stat-box"><div class="value">${s.level}</div><div class="label">Level</div></div>
          <div class="stat-box"><div class="value">${s.current_streak}</div><div class="label">Day Streak</div></div>
          <div class="stat-box"><div class="value">${quizzes.length}</div><div class="label">Quizzes Done</div></div>
        </div>`;

      // ── Jacob's Report: strengths, weaknesses, what to do next ──
      // Classify every practised section by accuracy (needs a meaningful sample).
      const graded = Object.entries(sections)
        .map(([id, sec]) => ({ id, name: SECTION_NAMES[id] || id, p: pct(sec.correct, sec.total), correct: sec.correct, total: sec.total, count: sec.count }))
        .filter(x => x.total >= 5);
      const strengths = graded.filter(x => x.p >= 80).sort((a, b) => b.p - a.p);
      const steady = graded.filter(x => x.p >= 60 && x.p < 80).sort((a, b) => a.p - b.p);
      const needsWork = graded.filter(x => x.p < 60).sort((a, b) => a.p - b.p);

      // Per-passage / per-type weak spots (sub_section detail)
      const subs = {};
      for (const q of quizzes) {
        if (!q.sub_section) continue;
        const k = `${q.section}||${q.sub_section}`;
        if (!subs[k]) subs[k] = { section: q.section, sub: q.sub_section, correct: 0, total: 0 };
        subs[k].correct += q.correct; subs[k].total += q.total;
      }
      const weakSubs = Object.values(subs)
        .map(x => ({ ...x, p: pct(x.correct, x.total), name: SECTION_NAMES[x.section] || x.section }))
        .filter(x => x.total >= 5 && x.p < 60)
        .sort((a, b) => a.p - b.p).slice(0, 6);

      // Plain-English summary line
      let summary;
      if (quizzes.length === 0) {
        summary = 'No practice recorded yet. Once Jacob completes a few tests, a full breakdown of his strengths and weak spots will appear here.';
      } else if (graded.length === 0) {
        summary = 'He has made a start. A little more practice in each area and this report will show where he is strong and where to focus.';
      } else {
        const sName = strengths.slice(0, 2).map(x => x.name).join(' and ');
        const wName = needsWork.length ? needsWork[0].name : (steady.length ? steady[0].name : '');
        summary = (strengths.length ? `Jacob is doing well at ${sName}. ` : '') +
                  (wName ? `The area to focus on next is <strong>${wName}</strong>.` : 'He is solid across everything he has practised so far.');
      }

      html += `<div class="card report-card"><h2>Jacob's Report</h2>
        <p class="report-summary">${summary}</p>`;

      if (strengths.length) {
        html += `<div class="report-block"><h3 class="report-h good">✅ Doing well</h3>`;
        for (const x of strengths) html += `<div class="report-row"><span class="report-name">${x.name}</span><span class="report-acc good">${x.p}%</span></div>`;
        html += `</div>`;
      }
      if (steady.length) {
        html += `<div class="report-block"><h3 class="report-h mid">🟡 Getting there</h3>`;
        for (const x of steady) html += `<div class="report-row"><span class="report-name">${x.name}</span><span class="report-acc mid">${x.p}%</span></div>`;
        html += `</div>`;
      }
      if (needsWork.length) {
        html += `<div class="report-block"><h3 class="report-h bad">🔴 Needs work &mdash; what to do next</h3>`;
        for (const x of needsWork) {
          html += `<div class="report-advice">
            <div class="report-advice-head"><span class="report-name">${x.name}</span><span class="report-acc bad">${x.p}% (${x.correct}/${x.total})</span></div>
            <p class="report-tip">${SECTION_ADVICE[x.id] || 'Practise this area little and often.'}</p>
          </div>`;
        }
        html += `</div>`;
      } else if (quizzes.length > 0 && graded.length > 0) {
        html += `<p class="help-none">👍 Nothing below 60% right now &mdash; keep the practice ticking over.</p>`;
      }

      if (weakSubs.length) {
        html += `<div class="report-block"><h3 class="report-h bad">Specific trouble spots</h3>`;
        for (const w of weakSubs) html += `<div class="report-row"><span class="report-name">${w.name}: ${w.sub}</span><span class="report-acc bad">${w.p}%</span></div>`;
        html += `</div>`;
      }
      html += `</div>`;

      // ── Latest activities: exactly what he got right and wrong ──
      const recentWithDetail = quizzes
        .filter(q => Array.isArray(q.details) && q.details.length)
        .slice(0, 6);
      if (recentWithDetail.length) {
        html += `<div class="card review-card"><h2>What Jacob got wrong (most recent)</h2>
          <p class="report-summary">Tap through these with him. The answer he picked is in red, the right answer in green.</p>`;
        for (const q of recentWithDetail) {
          const p = pct(q.correct, q.total);
          const nm = SECTION_NAMES[q.section] || q.section;
          const sub = q.sub_section ? ' &middot; ' + q.sub_section.replace(/-/g, ' ') : '';
          html += `<div class="rev-activity">
            <div class="rev-head"><span class="rev-title">${nm}${sub}</span>
              <span class="rev-score ${accClass(p)}">${q.correct}/${q.total} (${p}%)</span>
              <span class="rev-time">${fmtTime(q.completed_at)}</span></div>`;
          for (const d of q.details) {
            html += `<div class="rev-q">
              <div class="rev-prompt">${d.q || ''}</div>
              <div class="rev-ans"><span class="rev-given">Picked: ${d.given || '(none)'}</span>
                <span class="rev-correct">Answer: ${d.correct || ''}</span></div>
            </div>`;
          }
          html += `<p class="report-tip">How to help: ${SECTION_ADVICE[q.section] || 'Go over these together and try the activity again later.'}</p>`;
          html += `</div>`;
        }
        html += `</div>`;
      }

      // Per-section breakdown
      html += `<div class="card"><h2>Performance by Section</h2><div class="section-grid">`;
      for (const [id, name] of Object.entries(SECTION_NAMES)) {
        const sec = sections[id];
        if (!sec) {
          html += `<div class="section-card">
            <div class="name">${name}</div>
            <div class="detail">Not started yet</div>
            <div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>
          </div>`;
        } else {
          const p = pct(sec.correct, sec.total);
          html += `<div class="section-card">
            <div class="name">${name}</div>
            <div class="detail">${sec.count} quizzes, ${sec.correct}/${sec.total} correct</div>
            <div class="accuracy ${accClass(p)}">${p}%</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>
          </div>`;
        }
      }
      html += `</div></div>`;

      // Daily activity
      if (activity.length > 0) {
        html += `<div class="card"><h2>Daily Activity (last 2 weeks)</h2>`;
        for (const a of activity) {
          html += `<div class="activity-row">
            <span class="activity-date">${fmtDate(a.date)}</span>
            <span class="activity-quizzes">${a.quizzes_done} quiz${a.quizzes_done === 1 ? '' : 'zes'}</span>
            <span class="activity-xp">+${a.total_xp} XP</span>
          </div>`;
        }
        html += `</div>`;
      }

      // Recent quizzes
      if (quizzes.length > 0) {
        html += `<div class="card"><h2>Recent Quizzes</h2>`;
        for (const q of quizzes.slice(0, 20)) {
          const p = pct(q.correct, q.total);
          const sub = q.sub_section ? ` (${q.sub_section})` : '';
          html += `<div class="recent-quiz">
            <span class="quiz-section">${SECTION_NAMES[q.section] || q.section}${sub}</span>
            <span class="quiz-score ${accClass(p)}">${q.correct}/${q.total} (${p}%)</span>
            <span class="quiz-time">${fmtTime(q.completed_at)}</span>
          </div>`;
        }
        html += `</div>`;
      }

      if (quizzes.length === 0) {
        html += `<div class="card"><p style="text-align:center;color:#888;padding:20px;">No quizzes completed yet. Send Jacob the app link!</p></div>`;
      }

      el.innerHTML = html;
    }

    window.loadDashboard = loadDashboard;
    loadDashboard();
  </script>
</body>
</html>
